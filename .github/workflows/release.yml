name: Release Automático

on:
  push:
    branches: [main]
    paths:
      - 'VERSION'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ler versão
        id: ver
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Verificar se release já existe
        id: check
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release $TAG já existe — nada a fazer."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release $TAG não existe — criando."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Criar zip
        if: steps.check.outputs.exists == 'false'
        run: python3 tools/make_release_zip.py

      - name: Criar GitHub Release
        if: steps.check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          gh release create "v${VERSION}" \
            "pcp_enfestos-${VERSION}.zip" \
            --title "PCP Enfestos v${VERSION}" \
            --notes "Atualização automática — v${VERSION}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
